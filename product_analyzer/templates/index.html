<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品市场潜力分析</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #343a40;
            margin-bottom: 30px;
            text-align: center;
        }
        .btn-primary {
            width: 100%;
            margin-top: 20px;
        }
        .form-control {
            height: 50px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>商品市场潜力分析</h1>
            <form method="POST">
                <div class="mb-3">
                    <label for="product_name" class="form-label">商品名称</label>
                    <input type="text" class="form-control" id="product_name" name="product_name" placeholder="请输入商品名称" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">搜索</button>
            </form>
        </div>
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p>© 2026 商品市场潜力分析工具</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
